<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
        }

        .navbar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        .logout {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            margin-top: 20px;
        }

    </style>
</head>
<body>

<div class="navbar">
    <h3>Health Insurance System</h3>
    <a href="/logout" class="logout">Logout</a>
</div>

<div class="container">
    <div class="card">
        <h2>Welcome to Dashboard 🎉</h2>
        <p>You are successfully logged in.</p>
    </div>

    <div class="card">
        <h3>Your Features</h3>
        <ul>
            <li>✔ Member Management</li>
            <li>✔ Policy Management</li>
            <li>✔ Document Upload</li>
            <li>✔ Notifications</li>
        </ul>
    </div>
</div>

</body>
</html>
